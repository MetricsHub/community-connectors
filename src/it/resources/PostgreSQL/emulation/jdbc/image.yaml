- query: SELECT (LOWER(version()) LIKE '%postgresql%')::int AS is_postgresql;
  response: 63ceea8b-2e04-4cb8-b924-04885860990d.csv
- query: |
    SELECT db.datname, -- $1
          psd.xact_commit, -- $2
          psd.xact_rollback, -- $3
          psd.deadlocks, -- $4
          psd.temp_files, -- $5
          psd.tup_updated, -- $6
          psd.tup_returned, -- $7
          psd.tup_fetched,  -- $8
          psd.tup_inserted, -- $9
          psd.tup_deleted, -- $10
          coalesce(psd.blks_hit, 0) * current_setting('block_size')::int AS blks_hit_bytes, -- $11
          coalesce(psd.blks_read, 0) * current_setting('block_size')::int AS blks_read_bytes, -- $12
          pg_database_size(db.datname) AS db_size, -- $13
          psd.active_time / 1000.0 AS active_time_seconds, -- $14
          psd.session_time / 1000.0 AS session_time_seconds, -- $15
          psd.idle_in_transaction_time / 1000.0 AS idle_in_tx_time_seconds, --$16
          psd.sessions, -- $17
          psd.sessions_abandoned, -- $18
          psd.sessions_fatal, -- $19
          psd.sessions_killed, -- $20
          a.active_connections AS active_connections, -- $21
          a.idle_connections AS idle_connections -- $22
      FROM pg_stat_database psd
      JOIN pg_database db ON db.oid = psd.datid
      LEFT JOIN (
            SELECT datname,
                  COUNT(*) FILTER (WHERE state = 'active') AS active_connections,
                  COUNT(*) FILTER (WHERE state = 'idle') AS idle_connections
            FROM pg_stat_activity
            WHERE datname IS NOT NULL
            GROUP BY datname
        ) a ON a.datname = db.datname
      WHERE db.datistemplate = false
        AND db.datname IS NOT NULL;
  response: ea2ce4ae-0b9e-4158-8893-1e16b77df66b.csv
- query: |
    SELECT
        current_database() AS db_namespace, -- $1
        version() AS version, -- $2
        current_setting('max_connections')::int AS max_connections, -- $3
        EXTRACT(EPOCH FROM now() - pg_postmaster_start_time()) AS uptime_seconds, -- $4
        a.total_connections, -- $5
        bg.buffers_alloc * bs.block_size AS buffers_allocated_bytes, -- $6
        bg.buffers_clean * bs.block_size AS bg_writes_bytes, -- $7
        bg.maxwritten_clean * bs.block_size AS maxwritten_count_bytes, -- $8
        cp.buffers_written * bs.block_size AS buffers_checkpoints_bytes, -- $9
        cp.num_requested AS checkpoint_req, -- $10
        cp.num_timed AS checkpoint_scheduled, -- $11
        cp.write_time / 1000.0 AS write_time_s, -- $12
        cp.sync_time / 1000.0 AS sync_time_s, -- $13
        wal.wal_buffers_full, -- $14
        wal.wal_bytes, -- $15
        pg_size_bytes(current_setting('shared_buffers')) AS shared_buffers_bytes --$16
    FROM 
        (SELECT COUNT(*) AS total_connections
        FROM pg_stat_activity) a,
        (SELECT COUNT(*) AS user_table_count FROM pg_stat_user_tables) t,
        pg_stat_bgwriter bg,
        pg_stat_checkpointer cp,
        (SELECT wal_buffers_full, wal_bytes FROM pg_stat_wal) wal,
        (SELECT current_setting('block_size')::int AS block_size) bs;
  response: 102f542e-d8b0-4a47-98c0-8036a50bca3d.csv
- query: |
    SELECT
      usename,
      application_name,
      client_hostname,
      client_addr,
      EXTRACT(EPOCH FROM write_lag) AS write_lag_seconds,
      EXTRACT(EPOCH FROM flush_lag) AS flush_lag_seconds,
      EXTRACT(EPOCH FROM replay_lag) AS replay_lag_seconds,
      pg_wal_lsn_diff(sent_lsn, replay_lsn) AS lag_bytes,
      state
    FROM pg_stat_replication;
  response: d0580f2a-b0d2-44e9-aba3-b7acab44b60e.csv
- query: |
    SELECT current_database() AS db_name,
          relname AS relation, 
          mode AS lock_type, 
          COUNT(pid) AS locks
    FROM pg_locks 
    JOIN pg_class ON pg_locks.relation = pg_class.oid
    GROUP BY db_name, relname, mode
  response: 888dca0b-73f2-4bcc-afb8-cc02972e5c8e.csv
